name: US Bot Vagthund (daglig)

# Uafhaengig fejldetektor for US-botten. Koerer paa GITHUB_TOKEN (ingen API-noegle).
# US Analyse fyrer 22:00Z, US Handel 22:45Z via Claude Code Routines. Denne tjekker
# kl 23:50Z hverdage (efter opsamlings-workflowet 'Eksekver AI-beslutninger' kl 23:35Z) om dagens us/analysis + us/decisions findes; mangler de -> issue (mail).

on:
  schedule:
    - cron: "50 23 * * 1-5"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Tjek US-output og alarmer
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import os, json, datetime, urllib.request, urllib.error
          tok = os.environ["GH_TOKEN"]; repo = os.environ["REPO"]
          today = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          H = {"Authorization": f"Bearer {tok}", "Accept": "application/vnd.github+json"}

          def exists(path):
              u = f"https://api.github.com/repos/{repo}/contents/{path}?ref=main"
              try:
                  urllib.request.urlopen(urllib.request.Request(u, headers=H)); return True
              except urllib.error.HTTPError as e:
                  if e.code == 404: return False
                  raise

          missing = [f for f in (f"us/analysis/{today}.json", f"us/decisions/{today}.json") if not exists(f)]
          if f"us/decisions/{today}.json" not in missing:
              # decisions findes - tjek at workflowet "Eksekver AI-beslutninger" ogsaa eksekverede dem
              import base64
              try:
                  cj = json.load(urllib.request.urlopen(urllib.request.Request(
                      f"https://api.github.com/repos/{repo}/contents/us/data.json?ref=main", headers=H)))
                  d = json.loads(base64.b64decode(cj["content"]))
                  if d.get("last_executed_decisions") != today:
                      missing.append("us/data.json (decisions findes men er ikke eksekveret - koer workflowet 'Eksekver AI-beslutninger' manuelt)")
              except Exception as e:
                  print("kunne ikke tjekke us/data.json:", e)
          if not missing:
              print("OK: us/analysis, us/decisions og eksekvering ok for", today); raise SystemExit(0)
          print("MANGLER:", missing)

          title = f"US-bot: rutine leverede ikke output {today}"
          body = ("US trading-bot mangler i dag: " + ", ".join(missing) +
                  "\n\nRutiner: US Analyse (22:00Z) + US Handel (22:45Z) via Claude Code Routines. "
                  "'last_fired' kan vise at den fyrede selvom sessionen doede uden at skrive filer. "
                  "Koer den fejlende rutine manuelt igen for at gendanne.")

          issues = json.load(urllib.request.urlopen(urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues?state=open&per_page=100", headers=H)))
          ex = next((i["number"] for i in issues if i.get("title") == title), None)
          if ex:
              u = f"https://api.github.com/repos/{repo}/issues/{ex}/comments"; payload = {"body": body}
          else:
              u = f"https://api.github.com/repos/{repo}/issues"; payload = {"title": title, "body": body}
          urllib.request.urlopen(urllib.request.Request(
              u, data=json.dumps(payload).encode(), method="POST",
              headers={**H, "Content-Type": "application/json"}))
          print("Alarm sendt (issue", ex or "ny", ")")
          PY

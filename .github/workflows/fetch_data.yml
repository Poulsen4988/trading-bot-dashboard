name: Hent priser og nyheder (hver time)

on:
  schedule:
    # Kører hvert hele time 07:00-16:00 UTC (09:00-18:00 CET) på hverdage
    - cron: '0 7-16 * * 1-5'
  workflow_dispatch:  # Kan også trigges manuelt

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer afhængigheder
        run: pip install -r requirements.txt

      - name: Hent priser (yfinance)
        run: python scripts/fetch_prices.py

      - name: Opdater prishistorik (inkrementel; fuld om mandagen/ved manuel trigger)
        run: |
          if [ "$(date -u +%H)" -eq 16 ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/fetch_history.py
          else
            echo "Springer historik-opdatering over (kører kun kl 16 UTC eller ved manuel trigger)"
          fi
        env:
          FETCH_FULL_HISTORY: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}

      - name: Hent nyheder (yfinance)
        run: python news.py > /dev/null

      - name: Hent danske meddelelser (Nasdaq Copenhagen)
        run: python nasdaq_news.py
        continue-on-error: true

      - name: Opdater dashboard (GitHub Pages)
        run: python sync_dashboard.py
        continue-on-error: true
        env:
          DASHBOARD_PAT: ${{ secrets.DASHBOARD_PAT }}

      - name: Ryd gamle mellem-artefakter (>180 dage)
        run: python scripts/prune_old.py
        continue-on-error: true

      - name: Gem priser og nyheder til repo
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@github-actions"
          git add prices/ knowledge/ data.json screening/ analysis/ knowledge_cleanup_reports/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Data update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push

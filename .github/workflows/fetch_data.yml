name: Hent priser og nyheder (hver time)

on:
  schedule:
    # Dedikeret koersel 09:05 CEST (07:05 UTC) saa data er frisk til Analyse-rutinen kl. 09:15
    - cron: '5 7 * * 1-5'
    # Koerer hvert hele time 08:00-16:00 UTC (10:00-18:00 CEST) paa hverdage
    - cron: '0 8-16 * * 1-5'
  workflow_dispatch:  # Kan ogsaa trigges manuelt

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer afhaengigheder
        run: pip install -r requirements.txt

      - name: Hent priser (yfinance)
        run: python scripts/fetch_prices.py

      - name: Hent nyheder (yfinance)
        run: python news.py > /dev/null

      - name: Gem priser og nyheder til repo
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@github-actions"
          git add prices/ knowledge/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Data update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Opdater dashboard (GitHub Pages)
        run: python sync_dashboard.py
        env:
          DASHBOARD_PAT: ${{ secrets.DASHBOARD_PAT }}

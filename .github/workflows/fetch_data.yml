name: Hent priser og nyheder (hver time)

on:
  schedule:
    # Kører :17 i hver time 06:17-16:17 UTC (08:17-18:17 CET) på hverdage.
    # Minut :17 (ikke :00) rammer uden for GitHubs mest belastede tidspunkt, så
    # flere planlagte kørsler reelt fyrer. Start 06:17 giver friske priser før
    # Analyse-rutinen (07:15) og Handel-rutinen (07:45) kloner repoet.
    - cron: '17 6-16 * * 1-5'
  workflow_dispatch:  # Kan også trigges manuelt

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer afhængigheder
        run: pip install -r requirements.txt

      - name: Hent priser (yfinance)
        run: python scripts/fetch_prices.py

      - name: Opdater prishistorik (inkrementel; fuld om mandagen/ved manuel trigger)
        run: |
          if [ "$(date -u +%H)" -eq 16 ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/fetch_history.py
          else
            echo "Springer historik-opdatering over (kører kun kl 16 UTC eller ved manuel trigger)"
          fi
        env:
          FETCH_FULL_HISTORY: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}

      - name: Hent nyheder (yfinance)
        run: python news.py > /dev/null

      - name: Hent danske meddelelser (Nasdaq Copenhagen)
        run: python nasdaq_news.py
        continue-on-error: true

      - name: Opdater dashboard (GitHub Pages)
        run: python sync_dashboard.py
        continue-on-error: true
        env:
          DASHBOARD_PAT: ${{ secrets.DASHBOARD_PAT }}

      - name: Ryd gamle mellem-artefakter (>180 dage)
        run: python scripts/prune_old.py
        continue-on-error: true

      - name: Gem priser og nyheder til repo
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@github-actions"
          git add prices/ knowledge/ data.json screening/ analysis/ knowledge_cleanup_reports/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Data update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push

      # ---------------------------------------------------------------------
      # VAGTHUND: rutinerne (Analyse/Handel) kører via Claude Code Routines på
      # Anthropics infrastruktur — helt uden for denne Action. De kan fejle
      # STILLE (trigger "fyrer", men sessionen skriver aldrig filer), som det
      # skete 2026-06-24 og 2026-06-25. Denne Action er uafhængig (kører på
      # GITHUB_TOKEN), så den er det rette sted at opdage et stille udfald.
      # Tjekker hver hverdag fra 09 UTC (11 CET, efter begge rutiner burde være
      # færdige): mangler dagens analysis/ eller decisions/-fil → opret GitHub
      # issue (du får mail). Deduplikeres pr. dag, så højst ét issue/dag.
      # ---------------------------------------------------------------------
      - name: Vagthund — alarmér hvis dagens rutiner mangler output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          DOW=$(date -u +%u)    # 1-5 = mandag-fredag
          HOUR=$(date -u +%H)
          TODAY=$(date -u +%F)
          if [ "$DOW" -gt 5 ]; then
            echo "Weekend ($TODAY) — rutiner kører ikke, springer vagthund over."
            exit 0
          fi
          if [ "$HOUR" -lt 09 ]; then
            echo "Kl $HOUR UTC — før rutinerne burde være færdige, springer vagthund over."
            exit 0
          fi
          MISSING=""
          [ -f "analysis/$TODAY.json" ]  || MISSING="$MISSING Analyse(analysis/$TODAY.json)"
          [ -f "decisions/$TODAY.json" ] || MISSING="$MISSING Handel(decisions/$TODAY.json)"
          if [ -z "$MISSING" ]; then
            echo "OK: både analysis/$TODAY.json og decisions/$TODAY.json findes."
            exit 0
          fi
          echo "MANGLENDE OUTPUT for $TODAY:$MISSING"
          TITLE="Trading-bot: rutine leverede ikke output $TODAY"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --json number,title \
            --jq "first(.[] | select(.title | contains(\"output $TODAY\")) | .number)" 2>/dev/null || true)
          if [ -n "${EXISTING:-}" ] && [ "$EXISTING" != "null" ]; then
            echo "Issue #$EXISTING findes allerede for i dag — tilføjer status-kommentar."
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              --body "Stadig manglende kl ${HOUR}:xx UTC:$MISSING" || true
          else
            BODY=$(printf '%s\n' \
              "Vagthunden opdagede at en eller flere daglige rutiner IKKE leverede output for $TODAY (tjekket kl ${HOUR}:xx UTC)." \
              "" \
              "Mangler:$MISSING" \
              "" \
              "Rutinerne kører via Claude Code Routines (Analyse 07:15Z, Handel 07:45Z) — uden for denne GitHub Action. 'last_fired_at' kan være sat selvom sessionen aldrig skrev filer (stille fejl)." \
              "" \
              "Afhjaelpning:" \
              "- Mangler analysis/$TODAY.json: Analyse fejlede. Koer Analyse-rutinen manuelt igen (read-only, sikker). Handel stopper selv uden analyse-fil." \
              "- Mangler kun decisions/$TODAY.json: Handel fejlede. Koer Handel-rutinen manuelt igen (eksekverer dagens papirhandel)." \
              "" \
              "Auto-genereret af vagthund-steppet i .github/workflows/fetch_data.yml.")
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body "$BODY" \
              && echo "Oprettede nyt issue for $TODAY." \
              || echo "Kunne ikke oprette issue."
          fi

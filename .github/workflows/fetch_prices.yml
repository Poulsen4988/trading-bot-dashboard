name: Hent priser (08:30 CET)

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer afhaengigheder
        run: pip install yfinance pandas ta requests

      - name: Hent priser
        run: python scripts/fetch_prices.py

      - name: Gem priser
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@github-actions"
          git add prices/latest.json
          git diff --staged --quiet || git commit -m "Prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

name: Fetch Stock Prices

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch prices
        run: python3 scripts/fetch_prices.py

      - name: Commit prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices/latest.json
          git diff --cached --quiet || git commit -m "chore: update stock prices $(date +%Y-%m-%d)"
          git push
